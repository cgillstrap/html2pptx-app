<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML → PPTX Converter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    .header {
      padding: 16px 24px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #e94560;
    }

    .header .subtitle {
      font-size: 12px;
      color: #888;
    }

    .drop-zone {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 24px;
      border: 2px dashed #0f3460;
      border-radius: 12px;
      transition: all 0.2s ease;
      cursor: pointer;
      position: relative;
    }

    .drop-zone.dragover {
      border-color: #e94560;
      background: rgba(233, 69, 96, 0.05);
    }

    .drop-zone.processing {
      cursor: wait;
      opacity: 0.7;
    }

    .drop-zone-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.6;
    }

    .drop-zone-text {
      font-size: 16px;
      color: #aaa;
      margin-bottom: 8px;
    }

    .drop-zone-hint {
      font-size: 12px;
      color: #666;
    }

    /* Status / results panel */
    .status-panel {
      padding: 16px 24px;
      background: #16213e;
      border-top: 1px solid #0f3460;
      max-height: 240px;
      overflow-y: auto;
      display: none;
    }

    .status-panel.visible { display: block; }

    .status-entry {
      padding: 8px 0;
      border-bottom: 1px solid #0f3460;
      font-size: 13px;
      line-height: 1.5;
    }

    .status-entry:last-child { border-bottom: none; }

    .status-entry .file-name {
      font-weight: 600;
      color: #e94560;
    }

    .status-entry .success { color: #4caf50; }
    .status-entry .error   { color: #f44336; }
    .status-entry .warning { color: #ffa726; }
    .status-entry .info    { color: #888; }

    .status-entry .detail {
      font-size: 11px;
      color: #666;
      margin-top: 4px;
      font-family: 'Consolas', 'Courier New', monospace;
    }

    /* Batch summary bar */
    .batch-summary {
      padding: 10px 24px;
      font-size: 12px;
      font-weight: 600;
      border-top: 1px solid #0f3460;
    }

    .batch-summary.all-success {
      background: #1b3a2a;
      color: #4caf50;
    }

    .batch-summary.has-errors {
      background: #3a1b1b;
      color: #f44336;
    }

    .batch-summary.has-warnings {
      background: #3a2e1b;
      color: #ffa726;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>HTML → PPTX</h1>
    <span class="subtitle">Drop HTML files to extract & convert</span>
  </div>

  <div class="drop-zone" id="dropZone">
    <div class="drop-zone-icon">📄</div>
    <div class="drop-zone-text">Drop HTML files here</div>
    <div class="drop-zone-hint">.html or .htm files generated by AI</div>
  </div>

  <div class="status-panel" id="statusPanel">
    <!-- Status entries inserted dynamically by renderer.js -->
  </div>

  <script src="renderer.js"></script>
</body>
</html>
