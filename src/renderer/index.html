<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML → PPTX Converter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    .header {
      padding: 16px 24px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #e94560;
    }

    .header .subtitle {
      font-size: 12px;
      color: #888;
    }

    .drop-zone {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 24px;
      border: 2px dashed #0f3460;
      border-radius: 12px;
      transition: all 0.2s ease;
      cursor: pointer;
      position: relative;
    }

    .drop-zone.dragover {
      border-color: #e94560;
      background: rgba(233, 69, 96, 0.05);
    }

    .drop-zone.processing {
      cursor: wait;
      opacity: 0.7;
    }

    .drop-zone-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.6;
    }

    .drop-zone-text {
      font-size: 16px;
      color: #aaa;
      margin-bottom: 8px;
    }

    .drop-zone-hint {
      font-size: 12px;
      color: #666;
    }

    /* Status / results panel */
    .status-panel {
      padding: 16px 24px;
      background: #16213e;
      border-top: 1px solid #0f3460;
      max-height: 240px;
      overflow-y: auto;
      display: none;
    }

    .status-panel.visible { display: block; }

    .status-entry {
      padding: 8px 0;
      border-bottom: 1px solid #0f3460;
      font-size: 13px;
      line-height: 1.5;
    }

    .status-entry:last-child { border-bottom: none; }

    .status-entry .file-name {
      font-weight: 600;
      color: #e94560;
    }

    .status-entry .success { color: #4caf50; }
    .status-entry .error   { color: #f44336; }
    .status-entry .warning { color: #ffa726; }
    .status-entry .info    { color: #888; }

    .status-entry .detail {
      font-size: 11px;
      color: #666;
      margin-top: 4px;
      font-family: 'Consolas', 'Courier New', monospace;
    }

    /* Batch summary bar */
    .batch-summary {
      padding: 10px 24px;
      font-size: 12px;
      font-weight: 600;
      border-top: 1px solid #0f3460;
    }

    .batch-summary.all-success {
      background: #1b3a2a;
      color: #4caf50;
    }

    .batch-summary.has-errors {
      background: #3a1b1b;
      color: #f44336;
    }

    .batch-summary.has-warnings {
      background: #3a2e1b;
      color: #ffa726;
    }

    /* Header layout */
    .header-spacer { flex: 1; }

    .version-label {
      font-size: 11px;
      color: #aaa;
      font-family: 'Consolas', 'Courier New', monospace;
    }

    .settings-toggle {
      background: none;
      border: 1px solid #0f3460;
      border-radius: 6px;
      color: #888;
      font-size: 16px;
      padding: 4px 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .settings-toggle:hover { color: #e94560; border-color: #e94560; }
    .settings-toggle.active { color: #e94560; border-color: #e94560; background: rgba(233, 69, 96, 0.1); }

    /* Settings panel */
    .settings-panel {
      max-height: 0;
      overflow: hidden;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      transition: max-height 0.3s ease, padding 0.3s ease;
      padding: 0 24px;
    }
    .settings-panel.open {
      max-height: 400px;
      padding: 16px 24px;
    }

    .settings-group {
      margin-bottom: 14px;
    }
    .settings-group:last-child { margin-bottom: 0; }

    .settings-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .settings-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .settings-select, .settings-input {
      background: #1a1a2e;
      border: 1px solid #0f3460;
      border-radius: 4px;
      color: #e0e0e0;
      font-size: 13px;
      padding: 6px 10px;
      flex: 1;
    }
    .settings-select:focus, .settings-input:focus { border-color: #e94560; outline: none; }

    .settings-input-small {
      background: #1a1a2e;
      border: 1px solid #0f3460;
      border-radius: 4px;
      color: #e0e0e0;
      font-size: 13px;
      padding: 6px 10px;
      width: 80px;
      text-align: center;
    }
    .settings-input-small:focus { border-color: #e94560; outline: none; }

    .settings-x { color: #666; font-size: 13px; }
    .settings-hint { color: #555; font-size: 11px; }

    .settings-btn {
      background: #0f3460;
      border: none;
      border-radius: 4px;
      color: #e0e0e0;
      font-size: 12px;
      padding: 6px 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    .settings-btn:hover { background: #e94560; }

    .settings-btn-secondary {
      background: none;
      border: 1px solid #0f3460;
      border-radius: 4px;
      color: #888;
      font-size: 12px;
      padding: 6px 12px;
      cursor: pointer;
    }
    .settings-btn-secondary:hover { color: #e94560; border-color: #e94560; }

    .settings-toggle-label {
      font-size: 13px;
      color: #ccc;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .settings-toggle-label input[type="checkbox"] { accent-color: #e94560; }
  </style>
</head>
<body>
  <div class="header">
    <h1>HTML → PPTX</h1>
    <span class="subtitle">Drop HTML files to extract & convert</span>
    <span class="header-spacer"></span>
    <span class="version-label" id="versionLabel"></span>
    <button class="settings-toggle" id="settingsToggle" title="Settings">&#9881;</button>
  </div>

  <div class="settings-panel" id="settingsPanel">
    <div class="settings-group">
      <label class="settings-label">Output</label>
      <div class="settings-row">
        <select id="outputStrategy" class="settings-select">
          <option value="same-directory">Save alongside HTML file</option>
          <option value="save-dialog">Ask where to save each time</option>
          <option value="fixed-folder">Always save to a specific folder</option>
        </select>
      </div>
      <div class="settings-row" id="fixedFolderRow" style="display: none;">
        <input type="text" id="fixedFolderPath" class="settings-input" readonly placeholder="No folder selected">
        <button id="browseFolder" class="settings-btn">Browse...</button>
      </div>
    </div>

    <div class="settings-group">
      <label class="settings-label">Default Slide Dimensions (px)</label>
      <div class="settings-row">
        <input type="number" id="defaultWidth" class="settings-input-small" min="320" max="3840" placeholder="Auto">
        <span class="settings-x">&times;</span>
        <input type="number" id="defaultHeight" class="settings-input-small" min="240" max="2160" placeholder="Auto">
        <span class="settings-hint">Leave blank to detect from HTML</span>
      </div>
    </div>

    <div class="settings-group">
      <label class="settings-label">Options</label>
      <div class="settings-row">
        <label class="settings-toggle-label">
          <input type="checkbox" id="showWarnings" checked>
          Show extraction warnings
        </label>
      </div>
      <div class="settings-row">
        <label class="settings-toggle-label">
          <input type="checkbox" id="rememberLastFolder" checked>
          Remember last used folder
        </label>
      </div>
    </div>

    <div class="settings-group">
      <button id="resetDefaults" class="settings-btn-secondary">Reset to Defaults</button>
    </div>
  </div>

  <div class="drop-zone" id="dropZone">
    <div class="drop-zone-icon">📄</div>
    <div class="drop-zone-text">Drop HTML files here</div>
    <div class="drop-zone-hint">.html or .htm files generated by AI</div>
  </div>

  <div class="status-panel" id="statusPanel">
    <!-- Status entries inserted dynamically by renderer.js -->
  </div>

  <script src="renderer.js"></script>
</body>
</html>
